title: Password Spraying, Many Accounts from One Source
id: 0f1a2b3c-spry-4d5e-6f70-tyrian000007
status: stable
description: >
  Detects password spraying: a burst of bad-password failures (Event ID 4625,
  SubStatus 0xC000006A) across many distinct accounts from one source in a short
  window. Spraying is defined by breadth, not depth. Requires an aggregation-capable
  backend; the condition expresses the intent (count distinct targets per source).
references:
  - https://attack.mitre.org/techniques/T1110/003/
  - https://tyriancyber.com/attack/password-spraying
author: Tyrian
date: 2026/07/23
logsource:
  product: windows
  service: security
detection:
  selection:
    EventID: 4625
    SubStatus: '0xc000006a'   # bad password (account exists)
  timeframe: 5m
  condition: selection | count(TargetUserName) by IpAddress > 10
falsepositives:
  - A misconfigured service hammering one credential; baseline your threshold
level: high
tags:
  - attack.credential_access
  - attack.t1110.003
