title: LSASS Memory Access with Read Rights
id: 0f1a2b3c-lsass-4d5e-6f70-tyrian000003
status: stable
description: >
  Detects credential dumping by flagging process handle access to lsass.exe with
  read rights (Sysmon Event ID 10), excluding known security products. Tool-agnostic:
  catches Mimikatz, procdump, comsvcs, and custom loaders alike.
references:
  - https://attack.mitre.org/techniques/T1003/001/
  - https://tyriancyber.com/attack/lsass-credential-dumping
author: Tyrian
date: 2026/07/23
logsource:
  category: process_access
  product: windows        # Sysmon Event ID 10
detection:
  selection:
    TargetImage|endswith: '\lsass.exe'
    GrantedAccess:
      - '0x1010'
      - '0x1410'
      - '0x143a'
      - '0x1438'
  filter_known:
    SourceImage|endswith:
      - '\MsMpEng.exe'          # Microsoft Defender
      - '\wmiprvse.exe'
  condition: selection and not filter_known
falsepositives:
  - Your EDR/AV legitimately reading LSASS; add its image to filter_known
level: high
tags:
  - attack.credential_access
  - attack.t1003.001
